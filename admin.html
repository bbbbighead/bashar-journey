<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>靈感訊息 · 後台</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='14' y='14' width='72' height='72' rx='14' fill='none' stroke='%23c9b98a' stroke-width='6'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/calm.css">
</head>
<body>
<!-- 星圖背景（縱向星圖攝影，較深的塗層） -->
<div class="sky sky-admin" aria-hidden="true"></div>
<div class="app">

  <!-- 登入 -->
  <section class="screen active admin-screen" id="adminLogin">
    <div class="intake">
      <div class="eyebrow">靈感訊息 · 後台</div>
      <h1 class="h1-long">管理儀表板</h1>
      <div class="ask-box admin-login-box">
        <label for="adminPw">管理密碼</label>
        <input type="password" id="adminPw" class="admin-pw" placeholder="••••••••" autocomplete="current-password">
        <div class="admin-error" id="loginError"></div>
      </div>
      <button class="btn primary" id="btnLogin">登入</button>
    </div>
  </section>

  <!-- 儀表板 -->
  <section class="screen admin-screen" id="adminDash">
    <header class="admin-head">
      <div class="admin-title">靈感訊息 · 管理儀表板</div>
      <button class="btn ghost" id="btnLogout">登出</button>
    </header>

    <!-- 容量警示 -->
    <div class="cap-banner" id="capBanner" style="display:none"></div>

    <!-- 資料範圍：套用到總覽、來源/裝置、停留時間與使用紀錄 -->
    <div class="filter-bar scope-bar">
      <label class="scope-label" for="fltScope">資料範圍</label>
      <select class="flt-select" id="fltScope">
        <option value="complete">僅有題目的來訪（完成體驗）</option>
        <option value="all">全部來訪（含未完成）</option>
        <option value="incomplete">僅未完成的來訪（沒有題目）</option>
      </select>
      <span class="flt-count" id="scopeHint">套用到下方所有統計與紀錄清單</span>
    </div>

    <!-- 總覽 -->
    <div class="a-block">
      <h3>總覽</h3>
      <div class="stat-row" id="statRow"></div>
    </div>

    <div class="a-cols">
      <!-- 來源 -->
      <div class="a-block">
        <h3>登入管道（來源）</h3>
        <div class="chart-host" id="srcChart"></div>
      </div>
      <!-- 裝置 -->
      <div class="a-block">
        <h3>裝置平台</h3>
        <div class="chart-host" id="devChart"></div>
      </div>
    </div>

    <!-- 停留時間 -->
    <div class="a-block">
      <h3>各頁面平均停留時間</h3>
      <div class="chart-host" id="dwellChart"></div>
    </div>

    <!-- 使用紀錄 -->
    <div class="a-block">
      <h3>使用者歷史紀錄</h3>
      <div class="a-hint">點任一列展開該次的題目、選牌、報數與停留細節。顯示範圍由上方「資料範圍」控制——選「僅未完成」即可全選後批次刪除。</div>
      <div class="filter-bar">
        <select class="flt-select" id="fltDevice">
          <option value="">全部裝置</option>
          <option value="mobile">手機</option>
          <option value="desktop">電腦</option>
          <option value="tablet">平板</option>
        </select>
        <select class="flt-select" id="fltSource">
          <option value="">全部來源</option>
        </select>
        <span class="flt-count" id="fltCount"></span>
      </div>
      <div class="bulk-bar" id="bulkBar" style="display:none">
        <span id="bulkCount"></span>
        <button class="btn small danger" id="btnBulkDel">刪除選取的紀錄</button>
      </div>
      <table class="a-table sessions" id="sessTable">
        <thead><tr><th class="chk-col"><input type="checkbox" id="chkAll" title="全選目前顯示的紀錄"></th><th>時間</th><th>訪客</th><th>來源</th><th>裝置</th><th>題目</th><th>標註</th></tr></thead>
        <tbody></tbody>
      </table>
      <div class="a-actions"><button class="btn" id="btnMore">載入更多</button></div>
    </div>
  </section>

</div>
<script type="module" src="js/admin.js"></script>
</body>
</html>
